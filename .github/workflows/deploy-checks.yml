# Optional: GitHub Actions workflow for deployment checks
name: Deployment Checks

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: TypeScript build
        run: npm run build
      
      - name: Check for required env vars in example
        run: |
          grep -q "FRONTEND_URL" .env.example || exit 1
          grep -q "DATABASE_URL" .env.example || exit 1
          grep -q "JWT_SECRET" .env.example || exit 1

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: TypeScript build
        run: npm run build
      
      - name: Check for API URL config
        run: |
          grep -q "VITE_API_URL" .env || echo "Warning: .env not found"
